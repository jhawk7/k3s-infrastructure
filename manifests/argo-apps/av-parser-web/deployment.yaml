apiVersion: apps/v1
kind: Deployment
metadata:
  name: av-parser-web
  namespace: apps
  labels:
    app: av-parser-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: av-parser-web
  template:
    metadata:
      labels:
        app: av-parser-web
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      imagePullSecrets:
      - name: apps-registry-credentials
      nodeSelector:
        type: agent
        kubernetes.io/arch: arm64
      containers:
      - name: av-parser-web
        image: jhawk7/av-parser-web@sha256:219217427c79a7ae7008d700847340909471c1f3dac14de06ce3ba96875426fe
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: av-parser-web-secret
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
