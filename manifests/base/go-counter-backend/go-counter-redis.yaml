apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: go-counter-redis
  namespace: go-counter
spec:
  selector:
    matchLabels:
      app: go-counter-redis 
  template:
    metadata:
      labels:
        app: go-counter-redis
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
      - name: go-counter-registry-credentials
      containers:
      - name: redis
        image: redis:alpine
        command: ["/bin/sh", "-c"]
        args:
          - redis-server --requirepass "$${REDIS_PASS:?REDIS_PASS not set}" --save 60 1
        envFrom:
        - secretRef:
            name: go-counter-backend-redis-env
        volumeMounts:
        - name: go-counter-backend-redis-pvc
          mountPath: /data
        ports:
        - containerPort: 6379
  volumeClaimTemplates:
  - metadata:
      name: go-counter-backend-redis-pvc
      namespace: go-counter
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "nfs"
      resources:
        requests:
          storage: 100Mi