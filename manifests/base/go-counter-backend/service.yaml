apiVersion: v1
kind: Namespace
metadata:
  name: go-counter
---
apiVersion: v1
kind: Service
metadata:
  name: go-counter-backend-svc
  namespace: go-counter
spec:
  selector:
    app: go-counter-backend
  type: LoadBalancer
  loadBalancerIP: LB_IP #patched via kustomize
  ports:
  - name: http
    port: 8888
    targetPort: 8888
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: go-counter-redis-svc
  namespace: go-counter
spec:
  selector:
    app: go-counter-redis
  type: ClusterIP
  ports:
  - name: http
    port: 6379
    targetPort: 6379
    protocol: TCP