apiVersion: v1
kind: Namespace
metadata:
  name: cron
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: braves-alert
  namespace: cron
spec:
  schedule: "0 9 * * *"  # Run daily at 9 ET
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: cron-registry-credentials
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
          - name: braves-alert
            image: jhawk7/braves-alert:latest
            imagePullPolicy: IfNotPresent
            envFrom:
            - secretRef:
                name: braves-alert-secret #generated via kustomize
            - secretRef:
                name: smtp-cron-secret # generated via kustomize
          restartPolicy: OnFailure
