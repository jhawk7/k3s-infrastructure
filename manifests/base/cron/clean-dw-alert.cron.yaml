apiVersion: batch/v1
kind: CronJob
metadata:
  name: clean-dishwasher
  namespace: cron
spec:
  schedule: "0 9 6 */3 *"  # Run every quater on the 6th day at 9 ET; m h dom mon dow
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: cron-registry-credentials
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
          - name: clean-dishwasher
            image: jhawk7/smtp-alert:latest
            imagePullPolicy: IfNotPresent
            envFrom:
            - secretRef:
                name: smtp-cron-secret # generated via kustomize
            - secretRef:
                name: clean-dishwasher-secret # generated via kustomize
          restartPolicy: OnFailure