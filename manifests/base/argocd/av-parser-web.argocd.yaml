apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: av-parser-web
  namespace: argocd
  annotations:
    # Enable argocd-image-updater for this application
    argocd-image-updater.argoproj.io/image-list: app=jhawk7/av-parser-web:latest
    # Use digest update strategy to track image by digest
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    # Allow tracking of 'latest' tag (or specify a pattern like 'regexp:^v.*')
    #argocd-image-updater.argoproj.io/mqtt-sub-client.allow-tags: .*
    # Write back method: 'argocd' stores the override in ArgoCD app spec (not git)
    argocd-image-updater.argoproj.io/write-back-method: argocd
    # Optionally specify the platform (defaults to linux/amd64)
    argocd-image-updater.argoproj.io/app.platforms: linux/arm64
    # Optional: Force update check interval (default is 2 minutes)
    argocd-image-updater.argoproj.io/app.force-update: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/jhawk7/k3s-infrastructure.git
    targetRevision: main
    path: manifests/argo-apps/av-parser-web
    kustomize:
      patches:
        # placeholder for patch to update loadBalancerIP in Service spec
        - target:
            kind: Service
            name: av-parser-web
          patch: |-
            - op: replace

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - Validate=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
